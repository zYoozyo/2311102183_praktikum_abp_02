<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tabel Data | DataManager</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- DataTables CSS + Bootstrap 5 integration -->
  <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet" />

  <style>
    body {
      background-color: #f8f9fa;
    }

    .page-header {
      background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
      color: white;
      padding: 2rem 0 1.5rem;
      margin-bottom: 2rem;
    }

    .badge-pekerjaan {
      font-size: 0.78rem;
    }

    #dataTable_wrapper .dataTables_filter input {
      border-radius: 20px;
      padding-left: 12px;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <h2 class="mb-1"><i class="bi bi-table me-2"></i>Daftar Kontak</h2>
      <p class="mb-0 opacity-75">Kelola seluruh data kontak yang tersimpan</p>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container mb-5">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
        <h5 class="mb-0 text-primary"><i class="bi bi-people-fill me-2"></i>Data Kontak</h5>
        <a href="/tambah" class="btn btn-primary btn-sm">
          <i class="bi bi-plus-lg me-1"></i>Tambah Baru
        </a>
      </div>
      <div class="card-body">
        <!-- Tabel DataTables -->
        <div class="table-responsive">
          <table id="dataTable" class="table table-hover table-bordered align-middle w-100">
            <thead class="table-primary">
              <tr>
                <th>#</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Telepon</th>
                <th>Pekerjaan</th>
                <th>Tanggal Dibuat</th>
                <th class="text-center">Aksi</th>
              </tr>
            </thead>
            <tbody><!-- Diisi oleh DataTables via AJAX --></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL EDIT DATA -->
  <div class="modal fade" id="modalEdit" tabindex="-1" aria-labelledby="labelModalEdit" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content border-0 shadow">
        <div class="modal-header bg-warning text-dark">
          <h5 class="modal-title" id="labelModalEdit">
            <i class="bi bi-pencil-square me-2"></i>Edit Data Kontak
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <input type="hidden" id="editId" />
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nama Lengkap <span class="text-danger">*</span></label>
              <input type="text" id="editNama" class="form-control" placeholder="Masukkan nama lengkap" />
              <div class="invalid-feedback" id="errEditNama"></div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
              <input type="email" id="editEmail" class="form-control" placeholder="contoh@email.com" />
              <div class="invalid-feedback" id="errEditEmail"></div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">No. Telepon <span class="text-danger">*</span></label>
              <input type="text" id="editTelepon" class="form-control" placeholder="08xxxxxxxxxx" />
              <div class="invalid-feedback" id="errEditTelepon"></div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Pekerjaan <span class="text-danger">*</span></label>
              <input type="text" id="editPekerjaan" class="form-control" placeholder="Misal: Software Engineer" />
              <div class="invalid-feedback" id="errEditPekerjaan"></div>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Alamat <span class="text-danger">*</span></label>
              <textarea id="editAlamat" class="form-control" rows="3" placeholder="Jl. ..."></textarea>
              <div class="invalid-feedback" id="errEditAlamat"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="bi bi-x-lg me-1"></i>Batal
          </button>
          <button type="button" class="btn btn-warning" id="btnSimpanEdit">
            <i class="bi bi-save me-1"></i>Simpan Perubahan
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL KONFIRMASI HAPUS -->
  <div class="modal fade" id="modalHapus" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title"><i class="bi bi-trash3 me-2"></i>Konfirmasi Hapus</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center py-4">
          <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
          <p class="mt-3 mb-1 fs-5 fw-semibold">Yakin ingin menghapus data ini?</p>
          <p class="text-muted mb-0">Data <strong id="namaHapus"></strong> akan dihapus permanen dan tidak bisa
            dikembalikan.</p>
        </div>
        <div class="modal-footer justify-content-center">
          <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">
            <i class="bi bi-x-lg me-1"></i>Batal
          </button>
          <button type="button" class="btn btn-danger px-4" id="btnKonfirmasiHapus">
            <i class="bi bi-trash3 me-1"></i>Ya, Hapus
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
  <!-- navbar.js di-load setelah jQuery & Bootstrap agar toast container siap -->
  <script src="/js/navbar.js"></script>
  <script src="/js/helpers.js"></script>
  <script src="/js/tabel.js"></script>
</body>

</html>
