<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tambah Data | DataManager</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    body { background-color: #f8f9fa; }
    .page-header { background: linear-gradient(135deg, #198754 0%, #157347 100%); color: white; padding: 2rem 0 1.5rem; margin-bottom: 2rem; }
    .form-label { font-weight: 600; }
    .char-counter { font-size: 0.78rem; }
    .required-note { font-size: 0.82rem; }
  </style>
</head>
<body>

<!-- Page Header -->
<div class="page-header">
  <div class="container">
    <h2 class="mb-1"><i class="bi bi-person-plus-fill me-2"></i>Tambah Kontak Baru</h2>
    <p class="mb-0 opacity-75">Isi formulir di bawah untuk menambahkan data kontak</p>
  </div>
</div>

<!-- Form -->
<div class="container mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <!-- Info wajib -->
      <p class="required-note text-muted mb-3">
        <span class="text-danger">*</span> Kolom bertanda bintang wajib diisi
      </p>

      <div class="card shadow-sm border-0">
        <div class="card-header bg-success text-white py-3">
          <h5 class="mb-0"><i class="bi bi-clipboard-plus me-2"></i>Formulir Data Kontak</h5>
        </div>
        <div class="card-body p-4">
          <form id="formTambah" novalidate>
            <div class="row g-3">

              <!-- Nama -->
              <div class="col-md-6">
                <label for="nama" class="form-label">Nama Lengkap <span class="text-danger">*</span></label>
                <input type="text" id="nama" name="nama" class="form-control"
                  placeholder="Masukkan nama lengkap" maxlength="100" autocomplete="name" />
                <div class="d-flex justify-content-between">
                  <div class="invalid-feedback" id="errNama"></div>
                  <small class="char-counter text-muted ms-auto" id="ctrNama">0/100</small>
                </div>
              </div>

              <!-- Email -->
              <div class="col-md-6">
                <label for="email" class="form-label">Alamat Email <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email" id="email" name="email" class="form-control"
                    placeholder="contoh@email.com" autocomplete="email" />
                </div>
                <div class="invalid-feedback d-block" id="errEmail"></div>
              </div>

              <!-- Telepon -->
              <div class="col-md-6">
                <label for="telepon" class="form-label">No. Telepon <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                  <input type="text" id="telepon" name="telepon" class="form-control"
                    placeholder="08xxxxxxxxxx" maxlength="13" autocomplete="tel" />
                </div>
                <div class="invalid-feedback d-block" id="errTelepon"></div>
                <small class="text-muted">Format: 10–13 digit angka</small>
              </div>

              <!-- Pekerjaan -->
              <div class="col-md-6">
                <label for="pekerjaan" class="form-label">Pekerjaan <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-briefcase"></i></span>
                  <input type="text" id="pekerjaan" name="pekerjaan" class="form-control"
                    placeholder="Misal: Software Engineer" maxlength="80" />
                </div>
                <div class="invalid-feedback d-block" id="errPekerjaan"></div>
              </div>

              <!-- Alamat -->
              <div class="col-12">
                <label for="alamat" class="form-label">Alamat Lengkap <span class="text-danger">*</span></label>
                <textarea id="alamat" name="alamat" class="form-control" rows="4"
                  placeholder="Jl. Nama Jalan No. X, Kelurahan, Kecamatan, Kota"
                  maxlength="300"></textarea>
                <div class="d-flex justify-content-between">
                  <div class="invalid-feedback d-block" id="errAlamat"></div>
                  <small class="char-counter text-muted ms-auto" id="ctrAlamat">0/300</small>
                </div>
              </div>

            </div><!-- /row -->

            <!-- Actions -->
            <hr class="my-4" />
            <div class="d-flex gap-2 justify-content-end">
              <button type="button" id="btnReset" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
              </button>
              <a href="/" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left me-1"></i>Kembali
              </a>
              <button type="submit" id="btnSubmit" class="btn btn-success px-4">
                <i class="bi bi-save me-1"></i>Simpan Data
              </button>
            </div>
          </form>
        </div>
      </div><!-- /card -->

      <!-- Tips card -->
      <div class="card border-info mt-3">
        <div class="card-body py-2 px-3">
          <small class="text-info">
            <i class="bi bi-lightbulb-fill me-1"></i>
            <strong>Tips:</strong> Pastikan email yang dimasukkan valid dan unik karena digunakan sebagai identifikasi.
          </small>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/helpers.js"></script>
<script src="/js/tambah.js"></script>
</body>
</html>
