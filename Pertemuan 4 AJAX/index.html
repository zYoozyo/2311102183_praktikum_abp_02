<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul AJAX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 36px 40px;
            max-width: 440px;
            width: 100%;
        }

        .container h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .container p.subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
        }

        button#btn-ambil {
            width: 100%;
            padding: 11px;
            background-color: #4f6ef7;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s ease;
        }

        button#btn-ambil:hover {
            background-color: #3a56d4;
        }

        button#btn-ambil:active {
            background-color: #2e45b5;
        }

        #hasil-profil {
            display: none;
            margin-top: 20px;
            border: 1px solid #e8eaf0;
            border-radius: 10px;
            padding: 18px;
            background-color: #fafbff;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .profil-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #eef0f5;
        }

        .profil-row:last-child {
            border-bottom: none;
        }

        .profil-label {
            font-size: 12px;
            color: #888;
            width: 80px;
            flex-shrink: 0;
        }

        .profil-value {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a2e;
        }

        .icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .error-msg {
            color: #e03e3e;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Modul AJAX</h2>
        <p class="subtitle">Tampilkan data profil dari server</p>

        <button id="btn-ambil" onclick="ambilData()">Tampilkan Profil</button>

        <div id="hasil-profil"></div>
    </div>

    <script>
        function ambilData() {
            var btn = document.getElementById('btn-ambil');
            btn.textContent = 'Memuat...';
            btn.disabled = true;

            fetch('data.php')
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    var div = document.getElementById('hasil-profil');
                    div.style.display = 'block';
                    div.innerHTML =
                        '<div class="profil-row">' +
                            '<span class="profil-label">Nama</span>' +
                            '<span class="profil-value">' + data.nama + '</span>' +
                        '</div>' +
                        '<div class="profil-row">' +
                            '<span class="profil-label">Pekerjaan</span>' +
                            '<span class="profil-value">' + data.pekerjaan + '</span>' +
                        '</div>' +
                        '<div class="profil-row">' +
                            '<span class="profil-label">Lokasi</span>' +
                            '<span class="profil-value">' + data.lokasi + '</span>' +
                        '</div>';

                    btn.textContent = 'Tampilkan Profil';
                    btn.disabled = false;
                })
                .catch(function(error) {
                    var div = document.getElementById('hasil-profil');
                    div.style.display = 'block';
                    div.innerHTML = '<span class="error-msg"> Gagal mengambil data: ' + error.message + '</span>';

                    btn.textContent = 'Tampilkan Profil';
                    btn.disabled = false;
                });
        }
    </script>

</body>
</html>
